<!DOCTYPE html>                                                                                                                                                                                                                                                                                                            
  <html lang="ru">
  <head>                                                                                                                                                                                                                                                                                                                     
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming soon</title>                                                                                                                                                                                                                                                                                               
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }                                                                                                                                                                                                                                                                   
                       
      body {
        min-height: 100vh;
        display: flex;                                                                                                                                                                                                                                                                                                       
        align-items: center;
        justify-content: center;                                                                                                                                                                                                                                                                                             
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0e0e0e;                                                                                                                                                                                                                                                                                                 
        color: #f0f0f0;
        text-align: center;                                                                                                                                                                                                                                                                                                  
        padding: 2rem; 
      }

      h1 {                                                                                                                                                                                                                                                                                                                   
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 300;                                                                                                                                                                                                                                                                                                    
        letter-spacing: -0.02em;                            
        margin-bottom: 1rem;                                                                                                                                                                                                                                                                                                 
      }
                                                                                                                                                                                                                                                                                                                             
      p {                                                   
        color: #888;
        font-size: 1rem;
      }

      .dot {
        display: inline-block;
        width: 8px;                                                                                                                                                                                                                                                                                                          
        height: 8px;
        background: #f0f0f0;                                                                                                                                                                                                                                                                                                 
        border-radius: 50%;                                 
        margin-left: 4px;
        animation: blink 1.2s infinite;
      }                                                                                                                                                                                                                                                                                                                      
   
      @keyframes blink {                                                                                                                                                                                                                                                                                                     
        0%, 100% { opacity: 1; }                            
        50%      { opacity: 0.2; }
      }                                                                                                                                                                                                                                                                                                                      
    </style>
  </head>                                                                                                                                                                                                                                                                                                                    
  <body>                                                    
    <main>
      <h1>Coming soon<span class="dot"></span></h1>
		<img src="https://tankpas.nl/wp-content/themes/tankpas/images/logo.png" class="logo" alt="Travelcard logo">
    </main>                                                                                                                                                                                                                                                                                                                  
   
    <script type='text/javascript'>
		window.dataLayer = window.dataLayer || [];
		window.addEventListener("onEmbeddedMessagingWindowMinimized", (event) => {
			console.log('chat_closed');
			// dataLayer.push({ event: "chat_closed", "conversation_ID": event.detail.conversationId });
		});
		window.addEventListener("onEmbeddedMessagingWindowMaximized", (event) => {
			console.log('chat_started');
			// dataLayer.push({ event: "chat_started", "conversation_ID": event.detail.conversationId });
		});
		window.addEventListener("onEmbeddedMessageSent", (event) => {
			if (event.detail.conversationEntry.entryType == 'Message') {
				if (event.detail.conversationEntry.senderDisplayName == 'Guest') {
					console.log('message_submitted');
					// dataLayer.push({ event: "message_submitted", "conversation_ID": event.detail.conversationId });
				} else {
					if (event.detail.conversationEntry.entryPayload.includes('submitted your request, and a representative will follow up with you soon')) {
						console.log('chat_bot_net_lead');
						// dataLayer.push({ event: "chat_bot_net_lead", "conversation_ID": event.detail.conversationId });
					}
						
					console.log('message_response');
					// dataLayer.push({ event: "message_response", "conversation_ID": event.detail.conversationId });
				}
				console.log("onEmbeddedMessageSent detail: ", event.detail);
			}
		});

		// feedback custom buttons
		window.addEventListener("onEmbeddedMessagingReady", () => {
		    console.log("Messaging Ready");
		
		    observeMessages();
		});
		function observeMessages() {
		    const chatContainer = document.querySelector("embeddedservice-messaging");
		
		    const observer = new MutationObserver((mutations) => {
		        mutations.forEach((mutation) => {
		            mutation.addedNodes.forEach((node) => {
		                if (node.nodeType === 1 && node.classList.contains("agentMessage")) {
		                    addFeedbackButtons(node);
		                }
		            });
		        });
		    });
		
		    observer.observe(chatContainer.shadowRoot, {
		        childList: true,
		        subtree: true
		    });
		}
		function addFeedbackButtons(messageElement) {
		    // Avoid duplicates
		    if (messageElement.querySelector(".feedback-buttons")) return;
		
		    const container = document.createElement("div");
		    container.className = "feedback-buttons";
		    container.style.marginTop = "6px";
		
		    const up = document.createElement("button");
		    up.textContent = "👍";
		    up.onclick = () => sendFeedback("up", messageElement);
		
		    const down = document.createElement("button");
		    down.textContent = "👎";
		    down.style.marginLeft = "8px";
		    down.onclick = () => sendFeedback("down", messageElement);
		
		    container.appendChild(up);
		    container.appendChild(down);
		
		    messageElement.appendChild(container);
		}

		function sendFeedback(type, messageElement) {
		    const messageText = messageElement.innerText;
		
		    console.log("Feedback:", type, messageText);
		
		    // Example: send to Salesforce
		    // dataLayer.push({ event: "happy_chat", "conversation_ID": event.detail.conversationId });
			// dataLayer.push({ event: "unhappy_chat", "conversation_ID": event.detail.conversationId });
		}
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = 'en_US'; // For example, enter 'en' or 'en-US'

			embeddedservice_bootstrap.init(
				'00D9K00000Y0t91',
				'Pascal_AI',
				'https://fleetcor-eu--part.sandbox.my.site.com/ESWPascal1779361513624',
				{
					scrt2URL: 'https://fleetcor-eu--part.sandbox.my.salesforce-scrt.com'
				}
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
</script>
<script type='text/javascript' src='https://fleetcor-eu--part.sandbox.my.site.com/ESWPascal1779361513624/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>
                                                                                                                                                                                                                                                                     
  </body>
  </html>
